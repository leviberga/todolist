spring:
  application:
    name: todolist
  datasource:
    url: jdbc:postgresql://localhost:5432/database_todolist
    username: user_dev
    password: password_dev
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true